name: Deploy API to Docker Hub

on:
  workflow_call:              # Permite ser llamado por otros repositorios
    inputs:
      image-name:
        description: "Nombre de la imagen docker"
        required: true
        type: string
      image-tag:
        description: "Tag v1.0.0"
        required: true #cambio
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true        # El caller DEBE pasar este secreto
      DOCKER_PASSWORD:
        required: true        # El caller DEBE pasar este secreto
  
  workflow_dispatch:
    inputs:
      image-name:
        description: "Mi coso"
        required: true
        type: string
      image-tag:   # Permite ejecución manual desde GitHub UI
        description: "v1.0.0"
        required: true
        type: string

jobs: #cambiar todo
  pasos-en-la-nube:
    name: Build and Push Docker image
    runs-on: ubuntu-latest
    steps:
      - name: 1 . Descargar el codigo del repo
        uses: actions/checkout@v4
      - name: 2. Iniciar sesion en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: 3 . Armar la imagen y publicarla
        run: |
          IMAGEN_COMPLETA="${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}"
          docker build \
            -t "${IMAGEN_COMPLETA}:${{ inputs.image-tag }}" \
            -t "${IMAGEN_COMPLETA}:latest" \
            .

          docker push --all-tags "${IMAGEN_COMPLETA}"
